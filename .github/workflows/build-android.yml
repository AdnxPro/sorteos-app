name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código del repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4. Construir React app
      - name: Build React app
        run: npm run build

      # 5. Instalar Capacitor Android
      - name: Install Capacitor Android
        run: npm install @capacitor/android

      # 6. Sincronizar Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. Dar permisos a Gradle
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 8. Build APK Debug
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 9. Subir APK como artefacto descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sorteos-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk